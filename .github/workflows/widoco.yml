name: Generate Widoco Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  widoco-gen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Widoco
        run: wget https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar -O widoco.jar

      - name: Run Widoco
        run: |
          java -jar widoco.jar \
            -ontFile resources/ontoExhibit.rdf \
            -outFolder docs \
            -rewriteAll \
            -webVowl \
            -oops \
            -lang en-es \
            -htaccess \
            -uniteSections \
            -includeAnnotationProperties

      - name: Post-process Logo Size
        run: |
          find docs -name "*.html" -exec sed -i 's/width="50"/width="200"/g' {} +

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "chore: update widoco documentation [skip ci]" || echo "No changes to commit"
          git push
